robot_config:
  robot_type: so101
  hz: 15
  # SO101 has 5 arm joints (sts3215 motors in degrees) + 1 gripper (sts3215 in RANGE_0_100 stroke %).
  # In base_env, joint_dim = arm joint count, gripper_dim = gripper motor count.
  # action_space dim = joint_dim + gripper_dim = 6 (5 continuous joints + 1 binary gripper).
  joint_dim: 5
  gripper_dim: 1
  dual_arm: false
  use_cmd_pose: false

  # SO101 cameras: fixed (table-mounted) + wrist
  # No crop — original 640x480 (fixed) / 480x640 (wrist) gets resized directly to 128x128.
  image_crop: {}
  image_keys: ["fixed", "wrist"]
  image_resize:
    "fixed": [128, 128, 3]
    "wrist": [128, 128, 3]
  bgr2rgb: false   # lerobot SOFollower already returns RGB

  # action_scale only used by EE-delta (control_mode=pose). joint mode uses _send_joint_command directly,
  # but field must be present. Dummy values.
  action_scale: [1.0, 1.0, 1.0]

  # SO101 follower uses lerobot.SOFollower (Feetech bus over USB). 5 joint motors in degrees +
  # 1 gripper motor in 0-100 stroke percent. Task yaml must override control_mode=joint
  # (config.yaml defaults to "pose" for franka/ur).

  # Proprioceptive features used by SERLObsWrapper. SERL takes proprio_keys[:2] by default.
  # joints=5-dim, gripper_pose=1-dim → SERL flattens to 6-dim state, matching reward classifier
  # input_features.observation.state.shape and cube_103ep dataset state schema.
  # tcp_pose intentionally omitted (no FK in joint mode).
  proprio_keys: ["joints", "gripper_pose"]

  # SO101 lerobot port + calibration id (override in task yaml or via CLI per machine).
  # Laptop deployment: by-id paths bound to CH340 serials (stable across enumerate order).
  # follower CH340 serial 5C4C128258; leader CH340 serial 5C4C125442.
  so101_follower_port: "/dev/serial/by-id/usb-1a86_USB_Single_Serial_5C4C128258-if00"
  so101_follower_id: "so101_follower"
  so101_leader_port: "/dev/serial/by-id/usb-1a86_USB_Single_Serial_5C4C125442-if00"
  so101_leader_id: "so101_leader"

  # Cameras (lerobot OpenCV cameras). icSpring fourcc + index pinned to match SmolVLA deployment.
  # MUST match training dataset camera setup.
  so101_cameras:
    fixed:
      type: opencv
      index_or_path: "/dev/v4l/by-id/usb-icSpring_icspring_camera_202404160005-video-index0"
      width: 640
      height: 480
      fps: 30
      fourcc: "MJPG"
    wrist:
      type: opencv
      index_or_path: "/dev/v4l/by-id/usb-icSpring_icspring_camera-video-index0"
      width: 640
      height: 480
      fps: 30
      fourcc: "YUYV"

  # xyz EE bounding box — joint mode doesn't enforce this, but base_env reads abs_pose_limit_*[:3].
  # Dummy unit box; safety in joint mode goes via per-joint max_relative_target (below).
  target_pose: ${target_pose}
  abs_pose_limit_low: ${abs_pose_limit_low}
  abs_pose_limit_high: ${abs_pose_limit_high}
  reset_joint: ${reset_joint}

  # Per-joint single-step safety cap (degrees per control tick at 15 Hz).
  # 8°/tick × 15 Hz = 120°/s — fast enough for follower to track a human-paced
  # leader without obvious lag, still well under sts3215 native max (~300°/s).
  # Bump down to 3-5 for first-time policy rollouts where lag is acceptable in
  # exchange for stricter safety. 5 arm joints + 1 gripper.
  max_relative_target: [8.0, 8.0, 8.0, 8.0, 8.0, 10.0]

  # Policy action unnormalize bounds: SAC tanh squash outputs [-1, 1], we map to physical
  # joint degree range. Derived from cube_103ep dataset min/max with ±2° safety buffer.
  # SO101Station._extract_command applies the linear map per-call.
  # cube_103ep range: min=[-33.8, -104.2, -34.5, 43.5, -43.3], max=[63.2, 42.4, 96.7, 96.4, 62.6]
  so101_joint_action_min: [-36.0, -107.0, -37.0, 41.0, -46.0]
  so101_joint_action_max: [66.0, 45.0, 99.0, 99.0, 65.0]

  # No random init in joint mode (random_xy/rz only used in EE-delta mode).
  random_reset: false
  random_xy_range: 0.0
  random_rz_range: 0.0
  gripper_sleep: 0.05

  max_episode_length: ${max_episode_length}
  control_mode: ${control_mode}
  classifier_cfg: ${classifier_cfg}
  gripper_penalty: ${gripper_penalty}
  close_gripper: ${close_gripper}
  fix_gripper: ${fix_gripper}
  ego_mode: ${ego_mode}
